<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorthex - State Machine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');
:root{--void:#030408;--panel:#0b0d18;--border:#1a1e2e;--border-lit:#252a45;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:#e8ecff;font-family:'DM Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.hdr{flex-shrink:0;padding:11px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(3,4,8,0.97);z-index:30;}
.hdr-t{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:#6b749a;}
.hdr-s{font-size:8px;color:#2e3452;margin-top:2px;}
.tabs{display:flex;gap:2px;margin-left:20px;}
.tab{padding:5px 14px;font-family:'DM Mono',monospace;font-size:9px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all 0.15s;color:#2e3452;background:transparent;}
.tab.active{border-color:#9b59f7;color:#9b59f7;background:rgba(155,89,247,0.08);}
.tab:hover:not(.active){color:#6b749a;}
.legend{margin-left:auto;display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.leg{display:flex;align-items:center;gap:4px;font-size:7.5px;color:#2e3452;}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.ctrls{display:flex;gap:6px;margin-left:10px;}
.ctrl{padding:4px 9px;background:transparent;border:1px solid var(--border);border-radius:4px;color:#2e3452;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.15s;}
.ctrl:hover{border-color:#9b59f7;color:#9b59f7;}
.panels{flex:1;display:flex;overflow:hidden;position:relative;}
.panel{position:absolute;inset:0;display:none;overflow:hidden;}
.panel.active{display:block;}
.split{display:flex;height:100%;}
.lp{position:relative;overflow:hidden;width:60%;border-right:1px solid var(--border);cursor:grab;}
.lp:active{cursor:grabbing;}
.rp{width:40%;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.plbl{position:absolute;top:12px;left:16px;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:#2e3452;z-index:5;pointer-events:none;}
canvas{position:absolute;top:0;left:0;}
.op{padding:16px;display:flex;flex-direction:column;gap:8px;}
.dw{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:4px;}
.dt{font-size:8px;letter-spacing:0.12em;color:#2e3452;margin-bottom:8px;text-transform:uppercase;}
.db{display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:8px;}
.ds{height:100%;}
.dls{display:flex;gap:10px;flex-wrap:wrap;}
.dl{display:flex;align-items:center;gap:5px;font-size:8px;}
.dd{width:7px;height:7px;border-radius:50%;}
.bs{margin-bottom:6px;}
.bh{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px 6px 0 0;margin-bottom:2px;}
.bn{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:0.08em;}
.bc{font-size:8px;margin-left:auto;opacity:0.7;}
.pr{display:flex;align-items:center;padding:4px 8px;border-radius:4px;margin-bottom:2px;border:1px solid transparent;transition:all 0.12s;gap:0;}
.pr:hover{border-color:var(--border-lit);background:rgba(255,255,255,0.03);}
.pc{display:flex;gap:4px;flex:1;}
.chip{font-size:7.5px;padding:2px 6px;border-radius:8px;white-space:nowrap;}
.prt{font-family:'Cinzel',serif;font-size:13px;font-weight:600;min-width:44px;text-align:right;flex-shrink:0;}
.pst{font-size:7px;color:#2e3452;min-width:76px;text-align:right;flex-shrink:0;}
.of{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;height:100%;}
.sl{position:sticky;top:0;background:rgba(3,4,8,0.95);padding:10px 16px;border-bottom:1px solid var(--border);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:#2e3452;z-index:5;}
.tt{position:fixed;z-index:100;background:rgba(8,10,20,0.97);border:1px solid var(--border-lit);border-radius:8px;padding:10px 14px;max-width:240px;pointer-events:none;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.7);}
.te{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px;}
.tl{font-family:'Cinzel',serif;font-size:12px;color:#e8ecff;margin-bottom:5px;line-height:1.3;}
.tb{font-family:'Crimson Pro',serif;font-size:12px;font-style:italic;color:#6b749a;line-height:1.55;}
.tp{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.tpi{font-size:8px;padding:2px 7px;border-radius:8px;}</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-t">&#9672; VORTHEX &middot; ENCOUNTER ANALYSIS</div>
    <div class="hdr-s">125 paths &rarr; 26 distinct capture rates &rarr; 3 bonds &middot; Random 4-from-10: all-bad draws possible</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('split')">Split View</button>
    <button class="tab" onclick="switchTab('tree')">State Machine</button>
    <button class="tab" onclick="switchTab('outputs')">All Outputs</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#38d9f5;outline:2px solid #38d9f5;outline-offset:1px"></div>Deep Resonance</div>
    <div class="leg"><div class="leg-dot" style="background:#42f5a8"></div>Resonance</div>
    <div class="leg"><div class="leg-dot" style="background:#a0aacc"></div>Stillness</div>
    <div class="leg"><div class="leg-dot" style="background:#f5a623"></div>Backlash</div>
    <div class="leg"><div class="leg-dot" style="background:#f55442;outline:2px solid #f55442;outline-offset:1px"></div>Fracture</div>
    <div class="leg" style="margin-left:6px"><div class="leg-dot" style="background:#38d9f5"></div>Resonant</div>
    <div class="leg"><div class="leg-dot" style="background:#9b59f7"></div>Cautious</div>
    <div class="leg"><div class="leg-dot" style="background:#f59a23"></div>Reluctant</div>
  </div>
  <div class="ctrls">
    <button class="ctrl" id="btnR" onclick="resetView()">&#8853; Reset</button>
    <button class="ctrl" id="btnI" onclick="zoom(1.13)">+</button>
    <button class="ctrl" id="btnO" onclick="zoom(0.88)">&minus;</button>
  </div>
</div>
<div class="panels">
  <div class="panel active" id="panel-split">
    <div class="split">
      <div class="lp" id="lp"><div class="plbl">STATE MACHINE</div><canvas id="cS"></canvas></div>
      <div class="rp"><div class="sl">OUTPUT SPACE &mdash; 125 PATHS</div><div class="op" id="opS"></div></div>
    </div>
  </div>
  <div class="panel" id="panel-tree"><canvas id="cT"></canvas></div>
  <div class="panel of" id="panel-outputs">
    <div class="sl">ALL POSSIBLE OUTPUTS &mdash; 125 PATHS</div>
    <div class="op" id="opF"></div>
  </div>
</div>
<div class="tt" id="tt"><div class="te" id="te"></div><div class="tl" id="tl"></div><div class="tb" id="tb"></div><div class="tp" id="tp"></div></div>

function buildOutput(id) {
  const el = document.getElementById(id);
  let h = '<div class="dw">'
    + '<div class="dt">Bond distribution across 125 paths -- random 4-from-10: all-bad draws possible</div>'
    + '<div class="db">'
    + '<div class="ds" style="width:32%;background:#38d9f5"></div>'
    + '<div class="ds" style="width:22.4%;background:#9b59f7"></div>'
    + '<div class="ds" style="width:45.6%;background:#f59a23"></div>'
    + '</div>'
    + '<div class="dls">'
    + '<div class="dl"><div class="dd" style="background:#38d9f5"></div><span style="color:#38d9f5">Resonant</span>&nbsp;<span style="color:#2e3452">40 &middot; 32%</span></div>'
    + '<div class="dl"><div class="dd" style="background:#9b59f7"></div><span style="color:#9b59f7">Cautious</span>&nbsp;<span style="color:#2e3452">28 &middot; 22.4%</span></div>'
    + '<div class="dl"><div class="dd" style="background:#f59a23"></div><span style="color:#f59a23">Reluctant</span>&nbsp;<span style="color:#2e3452">57 &middot; 45.6%</span></div>'
    + '<div class="dl" style="margin-left:auto"><span style="color:#2e3452">26 distinct rates</span></div>'
    + '</div></div>';

  var bonds = ['Resonant Bond','Cautious Bond','Reluctant Bond'];
  for (var bi = 0; bi < bonds.length; bi++) {
    var bond = bonds[bi];
    var cfg = BC[bond];
    var paths = ALL_PATHS.filter(function(p){return p[8]===bond;});
    var rows = '';
    for (var pi = 0; pi < paths.length; pi++) {
      var p = paths[pi];
      var rate=p[0],t1=p[1],t2=p[2],t3=p[3],rage=p[4],calm=p[5],good=p[6],bad=p[7];
      var chips = [t1,t2,t3].map(function(t){
        var c=CC[t];
        return '<span class="chip" style="background:'+c.bg+';border:1px solid '+c.border+';color:'+c.text+'">'+c.label+'</span>';
      }).join('');
      rows += '<div class="pr"><div class="pc">'+chips+'</div>'
            + '<div class="pst">R'+rage+' C'+calm+' G'+good+' B'+bad+'</div>'
            + '<div class="prt" style="color:'+cfg.color+'">'+rate+'%</div></div>';
    }
    h += '<div class="bs"><div class="bh" style="background:'+cfg.bg+';border:1px solid '+cfg.border+'">'
       + '<div class="bn" style="color:'+cfg.color+'">'+bond+'</div>'
       + '<div class="bc" style="color:'+cfg.color+'">'+cfg.n+' &middot; '+cfg.pct+'</div>'
       + '</div>'+rows+'</div>';
  }
  el.innerHTML = h;
}

var tab='split';
function switchTab(t){
  tab=t;
  var tabs=document.querySelectorAll('.tab');
  var names=['split','tree','outputs'];
  tabs.forEach(function(el,i){el.classList.toggle('active',names[i]===t);});
  document.querySelectorAll('.panel').forEach(function(el){el.classList.remove('active');});
  document.getElementById('panel-'+t).classList.add('active');
  var sc=t!=='outputs';
  ['btnR','btnI','btnO'].forEach(function(id){document.getElementById(id).style.display=sc?'':'none';});
  if(t!=='outputs')setTimeout(resizeAll,10);
}

var camX=0,camY=0,camZ=1,drag=false,dsx,dsy,csx,csy,hov=null;
function getAC(){
  if(tab==='split'){var p=document.getElementById('lp');return{c:document.getElementById('cS'),W:p.offsetWidth,H:p.offsetHeight};}
  if(tab==='tree'){var p=document.getElementById('panel-tree');return{c:document.getElementById('cT'),W:p.offsetWidth,H:p.offsetHeight};}
  return null;
}
function resizeAll(){var ac=getAC();if(!ac)return;ac.c.width=ac.W;ac.c.height=ac.H;drawTree(ac.c,ac.W,ac.H);}
function tw2(n,W,H){return{x:n.cx*W*SX,y:n.cy*H*SY};}
function toSc(wx,wy){return{x:wx*camZ+camX,y:wy*camZ+camY};}
function nSc(id,W,H){var n=NODES.find(function(n){return n.id===id;});if(!n)return null;var w=tw2(n,W,H);return toSc(w.x,w.y);}
function nR(n,W){return n.r*W*camZ;}
function drawTree(cv,W,H){
  var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
  ctx.save();ctx.strokeStyle='rgba(26,30,46,0.3)';ctx.lineWidth=1;
  var gs=34*camZ,ox=((camX%gs)+gs)%gs,oy=((camY%gs)+gs)%gs;
  for(var x=ox;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=oy;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
  EDGES.forEach(function(e){dEdge(ctx,e,W,H);});
  NODES.forEach(function(n){dNode(ctx,n,W,H);});
}
function dEdge(ctx,e,W,H){
  var fs=nSc(e.a,W,H),ts=nSc(e.b,W,H);if(!fs||!ts)return;
  var fn=NODES.find(function(n){return n.id===e.a;}),tn=NODES.find(function(n){return n.id===e.b;});
  var fr=fn?nR(fn,W):0,tr=tn?nR(tn,W):0;
  var ang=Math.atan2(ts.y-fs.y,ts.x-fs.x);
  var sx=fs.x+Math.cos(ang)*fr,sy=fs.y+Math.sin(ang)*fr,ex=ts.x-Math.cos(ang)*tr,ey=ts.y-Math.sin(ang)*tr;
  var dx=ex-sx,cp1x=sx+dx*0.42,cp1y=sy,cp2x=sx+dx*0.58,cp2y=ey;
  ctx.save();ctx.strokeStyle=e.c;ctx.globalAlpha=e.s==='outcome'?0.65:0.6;
  ctx.lineWidth=e.s==='spine'?2.2*camZ:1.3*camZ;
  ctx.setLineDash(e.s==='spine'||e.s==='outcome'?[]:[4*camZ,5*camZ]);
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,ex,ey);ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=0.85;
  var aA=Math.atan2(ey-cp2y,ex-cp2x),aS=5*camZ;
  ctx.fillStyle=e.c;ctx.beginPath();ctx.moveTo(ex,ey);
  ctx.lineTo(ex-aS*Math.cos(aA-0.38),ey-aS*Math.sin(aA-0.38));
  ctx.lineTo(ex-aS*Math.cos(aA+0.38),ey-aS*Math.sin(aA+0.38));
  ctx.closePath();ctx.fill();
  if(e.l&&camZ>0.42){
    var mx=(sx+ex)/2,my=(sy+ey)/2,lsz=Math.max(6,7.5*camZ);
    ctx.font='400 '+lsz+'px DM Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    var tm=ctx.measureText(e.l).width;ctx.fillStyle='rgba(3,4,8,0.88)';
    ctx.beginPath();ctx.rect(mx-tm/2-4,my-lsz/2-3,tm+8,lsz+6);ctx.fill();
    ctx.fillStyle=e.c;ctx.globalAlpha=0.9;ctx.fillText(e.l,mx,my);
  }
  ctx.restore();
}
function dNode(ctx,n,W,H){
  var w=tw2(n,W,H),s=toSc(w.x,w.y),r=nR(n,W),isH=hov===n.id;
  ctx.save();if(isH){ctx.shadowColor=n.color;ctx.shadowBlur=22;}
  var g=ctx.createRadialGradient(s.x,s.y,r*0.5,s.x,s.y,r*2.2);g.addColorStop(0,n.color+'25');g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(s.x,s.y,r*2.2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  var fg=ctx.createRadialGradient(s.x-r*0.25,s.y-r*0.25,0,s.x,s.y,r);fg.addColorStop(0,n.color+'cc');fg.addColorStop(1,n.color+'42');
  ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
  ctx.strokeStyle=n.color;ctx.lineWidth=isH?2.5*camZ:1.5*camZ;ctx.stroke();ctx.restore();
  if(camZ>0.30){
    ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
    var lines=n.label.split('\n'),lsz=Math.max(5,Math.min(9,r*0.54)),lh=lsz*1.25,th=lines.length*lh;
    ctx.font='500 '+lsz+'px DM Mono,monospace';ctx.fillStyle='#fff';ctx.globalAlpha=0.95;
    lines.forEach(function(ln,i){ctx.fillText(ln,s.x,s.y-th/2+i*lh+lh/2);});
    if(camZ>0.48&&n.sub){var ssz=Math.max(4.5,lsz*0.68);ctx.font='300 '+ssz+'px DM Mono,monospace';ctx.fillStyle=n.color;ctx.globalAlpha=0.6;ctx.fillText(n.sub,s.x,s.y+th/2+ssz*1.2);}
    ctx.restore();
  }
}
var ttEl=document.getElementById('tt');
function nodeAt(sx,sy,W,H){
  for(var i=0;i<NODES.length;i++){var n=NODES[i],w=tw2(n,W,H),s=toSc(w.x,w.y),r=nR(n,W);if((sx-s.x)*(sx-s.x)+(sy-s.y)*(sy-s.y)<=r*r)return n;}
  return null;
}
function showTip(n,mx,my){
  document.getElementById('te').textContent=n.eye||'';document.getElementById('te').style.color=n.color;
  document.getElementById('tl').textContent=n.label.replace('\n',' ');
  document.getElementById('tb').textContent=n.body||'';
  var phtml='';(n.pills||[]).forEach(function(p){phtml+='<span class="tpi" style="background:'+p.c+'18;border:1px solid '+p.c+'44;color:'+p.c+'">'+p.t+'</span>';});
  document.getElementById('tp').innerHTML=phtml;
  ttEl.style.display='block';
  ttEl.style.left=Math.min(mx+14,window.innerWidth-262)+'px';
  ttEl.style.top=Math.min(my-8,window.innerHeight-190)+'px';
}
function hideTip(){ttEl.style.display='none';}
function drawActive(){var ac=getAC();if(ac)drawTree(ac.c,ac.W,ac.H);}
function setupEv(pid,getWH){
  var el=document.getElementById(pid);
  el.addEventListener('mousedown',function(e){drag=true;dsx=e.clientX;dsy=e.clientY;csx=camX;csy=camY;});
  el.addEventListener('mousemove',function(e){
    var rect=el.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,wh=getWH();
    if(drag){camX=csx+(e.clientX-dsx);camY=csy+(e.clientY-dsy);hideTip();drawActive();return;}
    var n=nodeAt(mx,my,wh.W,wh.H);hov=n?n.id:null;el.style.cursor=n?'pointer':'grab';
    if(n)showTip(n,e.clientX,e.clientY);else hideTip();drawActive();
  });
  el.addEventListener('mouseup',function(){drag=false;});
  el.addEventListener('mouseleave',function(){drag=false;hideTip();});
  el.addEventListener('wheel',function(e){
    e.preventDefault();var rect=el.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    var f=e.deltaY<0?1.1:0.91,nz=Math.min(3.5,Math.max(0.18,camZ*f));
    camX=mx-(mx-camX)*(nz/camZ);camY=my-(my-camY)*(nz/camZ);camZ=nz;drawActive();
  },{passive:false});
}
setupEv('lp',function(){return{W:document.getElementById('lp').offsetWidth,H:document.getElementById('lp').offsetHeight};});
setupEv('panel-tree',function(){return{W:document.getElementById('panel-tree').offsetWidth,H:document.getElementById('panel-tree').offsetHeight};});
function resetView(){var ac=getAC();if(!ac)return;camZ=0.55;camX=ac.W*0.01;camY=ac.H*0.25;drawActive();}
function zoom(f){var ac=getAC();if(!ac)return;var cx=ac.W/2,cy=ac.H/2,nz=Math.min(3.5,Math.max(0.18,camZ*f));camX=cx-(cx-camX)*(nz/camZ);camY=cy-(cy-camY)*(nz/camZ);camZ=nz;drawActive();}
window.addEventListener('resize',resizeAll);
buildOutput('opS');buildOutput('opF');
setTimeout(function(){resizeAll();resetView();},40);
